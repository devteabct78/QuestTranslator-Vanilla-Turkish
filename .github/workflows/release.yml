name: Automatic Addon Versioning and Release

on:
  push:
    branches:
      - main  # Change this to your default branch name if it is 'master' or something else

permissions:
  contents: write

jobs:
  build_release:
    name: Create New Version and Upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch all history so Git push works properly
          fetch-depth: 0

      - name: Generate Unique Version Tag (Timestamped)
        id: versioning
        run: |
          # Generates a standard tag like v1.0.20260618-1357
          TAG_NAME="v1.0.$(date +'%Y%m%d-%H%M')"
          # Generates a dot-notation version specifically for Lua and TOC strings like 1.0.20260618.1357
          LUA_VERSION="1.0.$(date +'%Y%m%d.%H%M')"
          
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "LUA_VERSION=$LUA_VERSION" >> $GITHUB_OUTPUT
          echo "Generated Version Tag: $TAG_NAME"

      - name: Update Version inside Addon Files Dynamically
        run: |
          # 1. Update the local QTR_version line in QuestTranslator.lua
          sed -i 's/local QTR_version = "[^"]*";/local QTR_version = "${{ steps.versioning.outputs.LUA_VERSION }}";/g' QuestTranslator.lua
          
          # 2. Update the QuestTranslator v. ... title string in QuestTranslatorFrames.xml
          sed -i 's/text="QuestTranslator v. [^"]*"/text="QuestTranslator v. ${{ steps.versioning.outputs.LUA_VERSION }}"/g' QuestTranslatorFrames.xml
          
          # 3. Update the ## Version tag inside the .toc file
          sed -i 's/^## Version: .*/## Version: ${{ steps.versioning.outputs.LUA_VERSION }}/g' QuestTranslator-Vanilla-Turkish.toc

      - name: Commit and Push Updated Files back to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add QuestTranslator.lua QuestTranslatorFrames.xml QuestTranslator-Vanilla-Turkish.toc
          
          # Only commit if changes actually exist to prevent workflow failure
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore(version): bump addon version to ${{ steps.versioning.outputs.LUA_VERSION }} [skip ci]"
            git push origin main
          fi

      - name: Package Addon Folder (Zip)
        run: |
          # Create a folder with the correct name that WoW client recognizes
          mkdir -p "QuestTranslator-Vanilla-Turkish"
          
          # Copy all files to the target folder, excluding git-related files
          rsync -av --exclude='.git' --exclude='.github' ./ ./QuestTranslator-Vanilla-Turkish/
          
          # Create the zip archive
          zip -r QuestTranslator-Vanilla-Turkish.zip QuestTranslator-Vanilla-Turkish/

      - name: Create GitHub Release and Upload Zip Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.TAG_NAME }}
          name: Release ${{ steps.versioning.outputs.TAG_NAME }}
          body: |
            Automated package release for QuestTranslator-Vanilla-Turkish.
            
            **Version Injected:** ${{ steps.versioning.outputs.LUA_VERSION }}
            
            **Installation:**
            1. Download the `QuestTranslator-Vanilla-Turkish.zip` file below.
            2. Extract it directly into your `World of Warcraft/Interface/AddOns/` directory.
          draft: false
          prerelease: false
          files: QuestTranslator-Vanilla-Turkish.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}